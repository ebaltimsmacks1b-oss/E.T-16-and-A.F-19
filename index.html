<!DOCTYPE html>
<html>
<head>
  <title>Our Memories 💖</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
      text-align: center;
      color: white;
      background: black;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    h1 {
      color: pink;
      margin-top: 20px;
      position: relative;
      z-index: 2;
    }

    .slideshow {
      width: 80%;
      max-width: 420px;
      border-radius: 15px;
      box-shadow: 0 0 25px pink;
      margin-top: 20px;
      position: relative;
      z-index: 2;
    }

    .heart {
      position: absolute;
      color: pink;
      font-size: 18px;
      animation: floatUp 6s linear infinite;
      opacity: 0.8;
      z-index: 1;
    }

    @keyframes floatUp {
      0% { transform: translateY(100vh); opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }

    #lockScreen {
      position: fixed;
      width: 100%;
      height: 100%;
      background: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    input {
      padding: 10px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
      text-align: center;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: pink;
      cursor: pointer;
      font-weight: bold;
    }

    #messageBox {
      display: none;
      position: fixed;
      bottom: 20px;
      background: rgba(255,192,203,0.9);
      color: black;
      padding: 15px;
      border-radius: 15px;
      width: 80%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
    }

    .heartBeat {
      font-size: 40px;
      color: red;
      animation: beat 1s infinite;
      position: relative;
      z-index: 2;
    }

    @keyframes beat {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
  </style>
</head>

<body>

<canvas id="stars"></canvas>

<!-- 🔐 LOCK SCREEN -->
<div id="lockScreen">
  <h2>💖 Enter Her Name to Continue</h2>
  <input id="nameInput" placeholder="Type name...">
  <button onclick="unlock()">Unlock 💕</button>
</div>

<h1>Our Memories 💕</h1>

<div class="heartBeat">💓</div>

<img id="slide" class="slideshow" src="images/photo1.jpg">

<br>

<button onclick="startExperience()">💖 Start Memories</button>
<button onclick="showMessage()">💌 Reveal Love Message</button>

<!-- 🎧 MUSIC -->
<audio id="music" loop>
  <source src="music/ohh-my-angel.mp3" type="audio/mpeg">
</audio>

<!-- 💌 MESSAGE -->
<div id="messageBox">
  You are my favorite place to go when my mind searches for peace 💖
</div>

<script>

const secretName = "angel";

function unlock() {
  let input = document.getElementById("nameInput").value.toLowerCase().trim();

  if (input === secretName) {
    document.getElementById("lockScreen").style.display = "none";

    const music = document.getElementById("music");
    music.volume = 0.5;

    music.play().catch(err => {
      console.log("Autoplay blocked until interaction");
    });

  } else {
    alert("Try again 💕");
  }
}

/* 🎞 SLIDESHOW */
const images = [
  "images/photo1.jpg",
  "images/photo2.jpg",
  "images/photo3.jpg",
  "images/photo4.jpg"
];

let i = 0;

setInterval(() => {
  i = (i + 1) % images.length;
  document.getElementById("slide").src = images[i];
}, 3000);

/* 💌 MESSAGE */
function showMessage() {
  document.getElementById("messageBox").style.display = "block";
  setTimeout(() => {
    document.getElementById("messageBox").style.display = "none";
  }, 4000);
}

/* 💞 FLOATING HEARTS */
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤";

  heart.style.left = Math.random() * window.innerWidth + "px";
  heart.style.animationDuration = (3 + Math.random() * 3) + "s";

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 250);

/* 🌌 STAR ANIMATION */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();

window.addEventListener("resize", resize);

let stars = Array(150).fill().map(() => ({
  x: Math.random() * canvas.width,
  y: Math.random() * canvas.height,
  r: Math.random() * 1.5
}));

function drawStars() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "white";

  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
}

function animateStars() {
  stars.forEach(s => {
    s.y += 0.2;
    if (s.y > canvas.height) s.y = 0;
  });
  drawStars();
  requestAnimationFrame(animateStars);
}

animateStars();

</script>

</body>
</html>
