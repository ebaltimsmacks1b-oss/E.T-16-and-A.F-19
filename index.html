<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Our Memories 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  overflow: hidden;
  height: 100vh;
  background: black;
}

/* STAR BACKGROUND */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
  from { opacity: 0.2; }
  to { opacity: 1; }
}

/* LOGIN SCREEN */
#loginScreen {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: white;
  z-index: 10;
}

#loginScreen input {
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
  text-align: center;
}

#loginScreen button {
  margin-top: 10px;
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  background: pink;
}

/* MAIN */
#main {
  display: none;
  height: 100vh;
  width: 100%;
  color: white;
  text-align: center;
  position: relative;
}

/* SLIDESHOW */
.slideshow {
  width: 80%;
  margin: 20px auto;
  position: relative;
}

.slideshow img,
.slideshow video {
  width: 100%;
  border-radius: 20px;
  display: none;
}

.slideshow img.active,
.slideshow video.active {
  display: block;
  animation: fade 1s ease-in-out;
}

@keyframes fade {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* MESSAGE BOX */
#messageBox {
  margin-top: 15px;
  cursor: pointer;
  background: rgba(255,255,255,0.1);
  padding: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<!-- STARS -->
<script>
for (let i = 0; i < 100; i++) {
  let star = document.createElement("div");
  star.className = "star";
  star.style.top = Math.random() * window.innerHeight + "px";
  star.style.left = Math.random() * window.innerWidth + "px";
  document.body.appendChild(star);
}
</script>

<!-- LOGIN -->
<div id="loginScreen">
  <h2>💖 Enter Her Name to Unlock 💖</h2>
  <input type="text" id="nameInput" placeholder="Type name...">
  <button onclick="unlock()">Enter</button>
</div>

<!-- MAIN CONTENT -->
<div id="main">

  <h1>Our Memories 💖</h1>

  <div class="slideshow">

    <!-- 12 PHOTOS -->
    <img class="slide active" src="photos/1.jpg">
    <img class="slide" src="photos/2.jpg">
    <img class="slide" src="photos/3.jpg">
    <img class="slide" src="photos/4.jpg">
    <img class="slide" src="photos/5.jpg">
    <img class="slide" src="photos/6.jpg">
    <img class="slide" src="photos/7.jpg">
    <img class="slide" src="photos/8.jpg">
    <img class="slide" src="photos/9.jpg">
    <img class="slide" src="photos/10.jpg">
    <img class="slide" src="photos/11.jpg">
    <img class="slide" src="photos/12.jpg">

    <!-- VIDEO -->
    <video class="slide" controls>
      <source src="video/1.mp4" type="video/mp4">
    </video>

  </div>

  <div id="messageBox" onclick="revealMessage()">
    💌 Click to reveal love message
  </div>

  <p id="loveMessage" style="display:none; margin-top:10px;">
    You are my forever, Abby 💖  
    Every moment with you is my favorite memory.
  </p>

</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music/song.mp3" type="audio/mp3">
</audio>

<!-- HEARTS -->
<canvas id="hearts"></canvas>

<script>
/* UNLOCK */
function unlock() {
  let name = document.getElementById("nameInput").value.trim().toLowerCase();

  if (name === "abby") {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("main").style.display = "block";
    document.getElementById("music").play();
    startSlides();
    startHearts();
  } else {
    alert("Wrong name 💔 try again");
  }
}

/* SLIDESHOW */
let index = 0;
function startSlides() {
  let slides = document.querySelectorAll(".slide");

  setInterval(() => {
    slides[index].classList.remove("active");
    index = (index + 1) % slides.length;
    slides[index].classList.add("active");
  }, 3000);
}

/* MESSAGE */
function revealMessage() {
  document.getElementById("loveMessage").style.display = "block";
}

/* HEARTS */
function startHearts() {
  const canvas = document.getElementById("hearts");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let hearts = [];

  function Heart() {
    this.x = Math.random() * canvas.width;
    this.y = canvas.height;
    this.size = Math.random() * 10 + 5;
    this.speed = Math.random() * 2 + 1;
  }

  for (let i = 0; i < 50; i++) {
    hearts.push(new Heart());
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "pink";

    hearts.forEach(h => {
      ctx.beginPath();
      ctx.arc(h.x, h.y, h.size, 0, Math.PI * 2);
      ctx.fill();

      h.y -= h.speed;

      if (h.y < 0) {
        h.y = canvas.height;
        h.x = Math.random() * canvas.width;
      }
    });

    requestAnimationFrame(draw);
  }

  draw();
}
</script>

</body>
</html>
